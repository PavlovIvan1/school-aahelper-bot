# Запуск из каталога helper-бота на сервере:
#   cp .env.docker.example .env.docker
#   docker compose --env-file .env.docker up -d --build

name: school-aahelperbot

services:
  bot:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      RESTART_LABEL: aahelper-bot
    ports:
      - "${WEBAPP_API_PORT:-8080}:8080"
    volumes:
      - ./data:/app/data

  # Даёт HTTPS-адрес (xxx.trycloudflare.com) для admin API без своего домена.
  # URL печатается в логах: docker compose logs -f cloudflared
  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate --url http://bot:8080
    depends_on:
      - bot
