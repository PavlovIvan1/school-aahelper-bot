# Запуск из каталога helper-бота на сервере:
#   cp .env.docker.example .env.docker
#   docker compose --env-file .env.docker up -d --build

name: school-aahelperbot

services:
  bot:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      RESTART_LABEL: aahelper-bot
    ports:
      - "${WEBAPP_API_PORT:-8080}:8080"
    volumes:
      - ./data:/app/data
